<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <radialGradient id="sun-glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#ffca28;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:1" />
    </radialGradient>
  </defs>
  <!-- Stylized Intertwined paths for the '8' -->
  <!-- Navy Blue Path -->
  <path d="M50 110 C 20 110, 10 80, 50 60 C 90 40, 80 10, 50 10 C 20 10, 10 40, 50 60 C 90 80, 80 110, 50 110 Z" 
        fill="none" stroke="#003366" stroke-width="12" stroke-linecap="round"/>
  <!-- Maroon Path (slightly offset to intertwine) -->
  <path d="M50 110 C 80 110, 90 80, 50 60 C 10 40, 20 10, 50 10 C 80 10, 90 40, 50 60 C 10 80, 20 110, 50 110 Z" 
        fill="none" stroke="#4a1a12" stroke-width="12" stroke-linecap="round"/>
  <!-- Orange Sun Dot -->
  <circle cx="50" cy="30" r="10" fill="url(#sun-glow)" />
</svg>
