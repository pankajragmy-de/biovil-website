name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deploy at a time; don't cancel a run that is mid-publish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/configure-pages@v6

      # Static site, no build step — upload the site files as-is.
      # NOTE: switch `path` to 'BioViL - India' once the site files move there.
      - uses: actions/upload-pages-artifact@v5
        with:
          path: '.'
          include-hidden-files: true

      - id: deployment
        uses: actions/deploy-pages@v5
